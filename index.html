<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>OSA FAGOS PORTAL</title>
    
    <link id="dynamic-favicon" rel="icon" type="image/png" href="/src/logo/images/osalogo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.onload = function() {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          
          // 1. Create a perfect square based on the largest side of your image
          const size = Math.max(img.width, img.height);
          canvas.width = size;
          canvas.height = size;
          
          const ctx = canvas.getContext('2d');
          
          // 2. Calculate the exact center coordinates
          const x = (size - img.width) / 2;
          const y = (size - img.height) / 2;
          
          // 3. Draw the image perfectly centered without stretching
          ctx.drawImage(img, x, y);
          
          // 4. Update the browser tab with the new "unsquished" square image
          document.getElementById('dynamic-favicon').href = canvas.toDataURL('image/png');
        };
        // Point this to your logo path
        img.src = '/src/logo/images/osalogo.png';
      };
    </script>
  </body>
</html>
